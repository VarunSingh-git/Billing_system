<html>

<head>
    <style>
        * {
            font-family: popins;
        }

        #btn {
            color: white;
            font-size: 16px;
            padding: 10px 60px;
            background-color: rgb(49, 146, 243);
            border-radius: 7px;
            border: 1px solid lightsteelblue;
            display: flex;
            margin: 50px auto;
        }

        #btn:hover {
            cursor: pointer;
            background-color: rgb(1, 114, 228);
        }
        .input {
            padding: 9px 55px 8px 10px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid lightsteelblue;
            display: flex;
        }

        .box {
            align-items: center;
            margin: 75px auto;
            height: 350px;
            background-color: rgb(204, 221, 233);
            width: 380px;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            padding: 15px 8px 8px 18px;
            box-shadow: 3px 3px 7px 2px rgb(68, 66, 66);

        }
        #productName{
            margin-top: 5px;
            margin-left: 50px;
            margin-bottom: 4px;
        }
        #Price {
            margin-left: 50px;
            margin-top: 5px;
            margin-bottom: 4px;
        }
        #Quantity{
            margin-bottom: 4px;
            margin-top: 5px;
            margin-left: 50px;
        }
        label {
            margin-top: 10px;
            margin-left: 50px;
        }
        #s{
            margin-left: 120px;
        }
        #menuImg{
            cursor: pointer;
        }
        #menu{
            font-size: 16px;
            display: flex;

        }

    </style>
</head>

<body>
    <div class="menuLogo">
    <img src="contact-form.png" alt="" height="30px" width="30px" id="menuImg">
    <span id="menu">Menu</span>
</div>
    <div class="box">
        <form action="bill.html" autocomplete="off" id="form">
            <span id="s"></span><BR></BR>
            <label for="productName">Product Name</label>
            <input type="text" id="productName" class="input" display="text" placeholder="Enter Product Name">
            <label for="Price">Price</label>
            <input type="number" id="Price" class="input" placeholder="Enter Price of unit (Rs)" maxlength="3">
            <label for="Quantity">Quantity</label>
            <input type="number" id="Quantity" class="input" maxlength="100" placeholder="Count of Product">

            
            <button id="btn" type="submit">Submit</button>
    </div>
    </form>
    <script src="index.js"></script>
</body>

</html>
